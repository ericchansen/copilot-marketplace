name: Validate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace.json
        run: |
          MARKET=.github/plugin/marketplace.json
          if [ ! -f "$MARKET" ]; then
            echo "::error::$MARKET not found"
            exit 1
          fi
          jq empty "$MARKET" || { echo "::error::$MARKET is not valid JSON"; exit 1; }
          NAME=$(jq -r .name "$MARKET")
          if [ -z "$NAME" ] || [ "$NAME" = "null" ]; then
            echo "::error::marketplace.json missing 'name'"
            exit 1
          fi
          COUNT=$(jq '.plugins | length' "$MARKET")
          echo "✓ marketplace.json valid (name: $NAME, $COUNT plugins)"

      - name: Validate marketplace plugin entries resolve
        run: |
          MARKET=.github/plugin/marketplace.json
          errors=0
          while read -r entry; do
            src=$(echo "$entry" | jq -r '.source')
            name=$(echo "$entry" | jq -r '.name')
            if [ ! -d "$src" ]; then
              echo "::error::plugin '$name' source dir '$src' does not exist"
              errors=$((errors + 1))
              continue
            fi
            if [ ! -f "$src/plugin.json" ]; then
              echo "::error::plugin '$name' missing $src/plugin.json"
              errors=$((errors + 1))
            fi
          done < <(jq -c '.plugins[]' "$MARKET")
          [ $errors -gt 0 ] && exit 1
          echo "✓ All marketplace entries resolve to a plugin.json"

      - name: Validate each plugin.json
        run: |
          errors=0
          for manifest in plugins/*/plugin.json; do
            jq empty "$manifest" || { echo "::error::$manifest is not valid JSON"; errors=$((errors + 1)); continue; }
            NAME=$(jq -r .name "$manifest")
            VERSION=$(jq -r .version "$manifest")
            if [ -z "$NAME" ] || [ "$NAME" = "null" ]; then echo "::error::$manifest missing 'name'"; errors=$((errors + 1)); fi
            if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then echo "::error::$manifest missing 'version'"; errors=$((errors + 1)); fi
            dir=$(dirname "$manifest")
            for field in skills agents mcpServers lspServers; do
              p=$(jq -r ".$field // empty" "$manifest")
              [ -z "$p" ] && continue
              case "$field" in
                skills|agents)
                  [ ! -d "$dir/$p" ] && { echo "::error::$manifest $field path '$p' missing"; errors=$((errors + 1)); } ;;
                *)
                  [ ! -f "$dir/$p" ] && { echo "::error::$manifest $field path '$p' missing"; errors=$((errors + 1)); } ;;
              esac
            done
          done
          [ $errors -gt 0 ] && exit 1
          echo "✓ All plugin.json manifests valid and component paths exist"

      - name: Validate SKILL.md frontmatter
        run: |
          errors=0
          for skill_file in plugins/*/skills/*/SKILL.md; do
            [ -f "$skill_file" ] || continue
            if ! head -1 "$skill_file" | grep -q '^---'; then
              echo "::error::$skill_file missing YAML frontmatter"
              errors=$((errors + 1))
              continue
            fi
            frontmatter=$(sed -n '/^---$/,/^---$/p' "$skill_file" | sed '1d;$d')
            for field in name description license allowed-tools; do
              if ! echo "$frontmatter" | grep -q "^$field:"; then
                echo "::error::$skill_file frontmatter missing '$field' field"
                errors=$((errors + 1))
              fi
            done
          done
          [ $errors -gt 0 ] && { echo "::error::$errors frontmatter error(s) found"; exit 1; }
          echo "✓ All SKILL.md files have valid frontmatter"
