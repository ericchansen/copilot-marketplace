name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  editorconfig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check file formatting against .editorconfig
        run: npx --yes editorconfig-checker
