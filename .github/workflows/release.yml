name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches marketplace.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MARKET_VERSION=$(jq -r .metadata.version .github/plugin/marketplace.json)
          if [ "$TAG_VERSION" != "$MARKET_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME doesn't match marketplace.json version $MARKET_VERSION"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
