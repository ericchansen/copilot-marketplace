<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/{{THEME}}.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css" />
  <style>
    /* Custom CSS variable overrides — edit for branding */
    :root {
      /* --r-background-color: #1a1a2e; */
      /* --r-main-font: 'Inter', sans-serif; */
      /* --r-main-color: #e8e8f0; */
      /* --r-heading-color: #ffffff; */
      /* --r-heading-font: 'Inter', sans-serif; */
      /* --r-link-color: #7c6af7; */
      /* --r-code-font: 'JetBrains Mono', monospace; */
    }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section
        data-markdown
        data-separator="^\r?\n---\r?\n$"
        data-separator-vertical="^\r?\n--\r?\n$"
        data-separator-notes="^Note:"
      >
<textarea data-template>
{{SLIDES_MARKDOWN}}
</textarea>
      </section>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/math/math.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      navigationMode: 'linear',
      transition: 'slide',
      slideNumber: 'c/t',
      center: true,
      autoAnimate: true,
      pdfSeparateFragments: false,
      defaultTiming: 120,
      plugins: [RevealMarkdown, RevealHighlight, RevealNotes, RevealMath.KaTeX],
    });
  </script>
</body>
</html>
